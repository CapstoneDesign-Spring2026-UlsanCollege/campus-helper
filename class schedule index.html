<section class="page" id="page-schedule">
    <div class="pg-header">
      <div><h1>Class Schedule</h1><p class="pg-sub">Periods, timetable &amp; countdown</p></div>
      <select class="pill-select" id="schedDay">
        <option value="0">Monday</option><option value="1">Tuesday</option>
        <option value="2">Wednesday</option><option value="3">Thursday</option>
        <option value="4">Friday</option>
      </select>
    </div>
    <div class="period-tracker" id="periodTracker">
      <div class="pt-info">
        <span class="pt-label">NOW</span>
        <span class="pt-val" id="ptVal">–</span>
      </div>
      <div class="pt-bar-wrap"><div class="pt-bar" id="ptBar"></div></div>
      <span class="pt-cd" id="ptCd"></span>
    </div>
    <div id="periodsList" class="periods-list"></div>
    <div class="section-label">Weekly Overview</div>
    <div id="weeklyGrid" class="weekly-grid"></div>
  </section>
